name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag matches manifest version
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag ($TAG) must match manifest.json version ($VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify release assets
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
